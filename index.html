<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d9b7ef" />
  <meta name="description" content="La Nevera de Crisp, app privada de entretenimiento personal." />
  <title>La Nevera de Crisp</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app" tabindex="-1"></main>

  <template id="home-template">
    <section class="home-screen" aria-label="La Nevera de Crisp">
      <div class="fridge-stage exact-home" aria-label="Nevera principal con imanes interactivos">
        <img src="assets/home-fridge-exact.png" alt="Nevera con imanes" class="fridge-composed" />

        <button class="click-zone zone-trivial" data-route="trivial" aria-label="Abrir Trivial Crisp"></button>
        <button class="click-zone zone-barbaridad" data-route="barbaridad" aria-label="Abrir ¿Quién dijo esta barbaridad?"></button>
        <button class="click-zone zone-runner" data-route="runner" aria-label="Abrir Crisp Runner"></button>
      </div>
    </section>
  </template>

  <template id="trivial-template">
    <section class="game-screen trivial-screen">
      <button class="back-magnet" data-route="home" aria-label="Volver a la nevera">← Nevera</button>
      <div class="game-card">
        <p class="kicker">Juego 1</p>
        <h1>Trivial Crisp</h1>
        <p class="intro">Estructura lista. En la v2 de contenido añadiremos las preguntas reales por categorías.</p>
        <div class="category-grid" aria-label="Categorías del trivial">
          <button>Faranduleo</button>
          <button>Películas y series</button>
          <button>Cultura pop</button>
          <button>Vida na leira</button>
          <button>Costa da Morte lore</button>
          <button>La vida de Cris</button>
        </div>
        <article class="question-card">
          <div class="score-row"><span>Ronda 1/10</span><span>0 puntos</span></div>
          <h2>Pregunta de muestra</h2>
          <p>¿Qué categoría quieres que domine esta partida?</p>
          <div class="answers">
            <button data-toast="Correcto, perra ilustrada.">A. Faranduleo de alto nivel</button>
            <button data-toast="Respuesta aceptable, pero con menos drama.">B. Cine y series</button>
            <button data-toast="Aquí hay material académico y basura premium.">C. Cultura pop</button>
            <button data-toast="La leira siempre tiene razón.">D. Vida na leira</button>
          </div>
        </article>
      </div>
    </section>
  </template>

  <template id="barbaridad-template">
    <section class="game-screen quote-screen">
      <button class="back-magnet" data-route="home" aria-label="Volver a la nevera">← Nevera</button>
      <div class="game-card">
        <p class="kicker">Juego 2</p>
        <h1>¿Quién dijo esta barbaridad?</h1>
        <p class="intro">Interfaz preparada para meter frases vuestras, frases míticas y barbaridades con denominación de origen.</p>
        <article class="quote-box">
          <blockquote>“Yo no me peino pa’ la gente fea. Paso olímpicamente.”</blockquote>
          <div class="answers stacked">
            <button data-toast="Correctísimo. Nivel Crisp.">A. Crisp</button>
            <button data-toast="Patri podría, pero hoy no.">B. Patri</button>
            <button data-toast="Podría ser, pero falta precisión jurídica del chisme.">C. Belén Esteban</button>
            <button data-toast="Ese señor tendría que declarar.">D. Un señor del bar</button>
          </div>
        </article>
      </div>
    </section>
  </template>

  <template id="runner-template">
    <section class="game-screen runner-screen">
      <button class="back-magnet" data-route="home" aria-label="Volver a la nevera">← Nevera</button>
      <div class="runner-wrap">
        <div class="runner-hud">
          <strong>Crisp Runner</strong>
          <span id="runnerScore">0</span>
        </div>
        <div class="runner-board" id="runnerBoard" aria-label="Crisp Runner demo">
          <div class="lane lane-left"></div>
          <div class="lane lane-mid"></div>
          <div class="lane lane-right"></div>
          <div class="runner-character" id="runnerCharacter" aria-hidden="true">🏃‍♀️</div>
          <div class="obstacle obstacle-1">drama</div>
          <div class="obstacle obstacle-2">red flag</div>
          <div class="pickup pickup-1">☕</div>
        </div>
        <div class="runner-controls" aria-label="Controles del runner">
          <button id="runnerLeft">←</button>
          <span>Desliza, toca o usa las flechas</span>
          <button id="runnerRight">→</button>
        </div>
      </div>
    </section>
  </template>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
